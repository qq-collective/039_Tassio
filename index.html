<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --accent3: #6affb8;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Zen Kaku Gothic New', sans-serif;
    --serif: 'Noto Serif JP', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* APIキー */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .api-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .api-status.ok { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }

  /* アップロードゾーン */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,255,0.05);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
  }
  .upload-zone h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .upload-zone p {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ファイル情報 */
  .file-info {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
    align-items: center;
    gap: 16px;
  }
  .file-info.show { display: flex; }
  .file-name {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
  }
  .file-size {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* 音声プレイヤー */
  #audioPlayer {
    width: 100%;
    margin-bottom: 24px;
    display: none;
    accent-color: var(--accent);
    filter: invert(0.85) hue-rotate(220deg);
  }

  /* ボタン */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #9380ff; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }
  .btn-stop {
    background: var(--accent2);
    color: white;
    display: none;
  }
  .btn-stop:hover { background: #ff8fa8; }
  .btn-stop.show { display: inline-flex; }
  .btn-analyze {
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
  }
  .btn-analyze:hover { background: rgba(106,255,184,0.08); }
  .btn-analyze:disabled { border-color: var(--border); color: var(--text-dim); cursor: not-allowed; }

  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  /* 文字起こし */
  .transcript-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }
  .transcript-box.show { display: block; }
  .box-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .box-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .transcript-text {
    font-family: var(--serif);
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }
  .transcript-text::-webkit-scrollbar { width: 4px; }
  .transcript-text::-webkit-scrollbar-track { background: var(--surface2); }
  .transcript-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ステータスバー */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    display: none;
  }
  .status-bar.show { display: flex; }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1s infinite;
    flex-shrink: 0;
  }
  .pulse.green { background: var(--accent3); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* 分析結果 */
  .result-grid {
    display: grid;
    gap: 20px;
    margin-top: 24px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card h3 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-card h3 .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .summary-text {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
  }

  /* 用語テーブル */
  .term-list {
    display: grid;
    gap: 12px;
  }
  .term-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent2);
  }
  .term-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .term-desc {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
  }

  /* チャート */
  .chart-container {
    background: var(--surface2);
    border-radius: 10px;
    padding: 20px;
    overflow-x: auto;
  }

  /* Mermaidスタイル上書き */
  .mermaid {
    text-align: center;
  }
  .mermaid svg {
    max-width: 100%;
  }

  /* ローディング */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    display: none;
  }
  .loading-card.show { display: block; }
  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .loading-text {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  /* エラー */
  .error-msg {
    background: rgba(255,106,138,0.1);
    border: 1px solid var(--accent2);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* 注意書き */
  .notice {
    background: rgba(124,106,255,0.08);
    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .notice strong { color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>// podcast_analyzer</h1>
    <span>文字起こし → 要約 → 図解</span>
  </header>

  <!-- API Key -->
  <div class="api-section">
    <span class="api-label">API_KEY</span>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-..." />
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="notice">
    <strong>使い方：</strong>
    ① Claude APIキーを入力 → ② 音声ファイルをアップロード（mp3/m4a/wav/ogg）→ ③「文字起こし開始」でChromeが音声をテキスト化 → ④「AIで分析」で要約・チャート・用語解説を生成<br>
    <strong>※ Chrome推奨（Web Speech APIを使用）。</strong>再生しながらリアルタイムで文字起こしします。
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="audio/*" />
    <span class="upload-icon">🎧</span>
    <h3>音声ファイルをドロップ</h3>
    <p>mp3 / m4a / wav / ogg / aac</p>
  </div>

  <!-- File Info -->
  <div class="file-info" id="fileInfo">
    <span class="file-name" id="fileName">—</span>
    <span class="file-size" id="fileSize">—</span>
  </div>

  <!-- Audio Player -->
  <audio id="audioPlayer" controls></audio>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnStart" disabled>▶ 文字起こし開始</button>
    <button class="btn btn-stop" id="btnStop">■ 停止</button>
    <button class="btn btn-analyze" id="btnAnalyze" disabled>✦ AIで分析</button>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="pulse" id="statusDot"></div>
    <span id="statusText">待機中</span>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Transcript -->
  <div class="transcript-box" id="transcriptBox">
    <div class="box-label">TRANSCRIPT</div>
    <div class="transcript-text" id="transcriptText"></div>
  </div>

  <!-- Loading -->
  <div class="loading-card" id="loadingCard">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loading-text" id="loadingText">Claude が分析中...</div>
  </div>

  <!-- Results -->
  <div class="result-grid" id="resultGrid"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    background: '#1e1e24',
    primaryColor: '#7c6aff',
    primaryTextColor: '#e8e8f0',
    primaryBorderColor: '#2a2a35',
    lineColor: '#7a7a90',
    secondaryColor: '#16161a',
    tertiaryColor: '#1e1e24',
    fontSize: '14px'
  }
});

// State
let audioFile = null;
let recognition = null;
let transcript = '';
let isRecognizing = false;

// Elements
const apiKeyInput = document.getElementById('apiKey');
const apiStatus = document.getElementById('apiStatus');
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const audioPlayer = document.getElementById('audioPlayer');
const btnStart = document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');
const btnAnalyze = document.getElementById('btnAnalyze');
const statusBar = document.getElementById('statusBar');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const errorMsg = document.getElementById('errorMsg');
const transcriptBox = document.getElementById('transcriptBox');
const transcriptText = document.getElementById('transcriptText');
const loadingCard = document.getElementById('loadingCard');
const loadingText = document.getElementById('loadingText');
const resultGrid = document.getElementById('resultGrid');

// API Key check
apiKeyInput.addEventListener('input', () => {
  const v = apiKeyInput.value.trim();
  apiStatus.className = 'api-status' + (v.startsWith('sk-ant-') ? ' ok' : '');
});

// File upload
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file || !file.type.startsWith('audio/')) {
    showError('音声ファイルを選択してください');
    return;
  }
  audioFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = (file.size / 1024 / 1024).toFixed(1) + ' MB';
  fileInfo.classList.add('show');
  audioPlayer.src = URL.createObjectURL(file);
  audioPlayer.style.display = 'block';
  btnStart.disabled = false;
  hideError();
  // Reset
  transcript = '';
  transcriptText.textContent = '';
  transcriptBox.classList.remove('show');
  resultGrid.innerHTML = '';
  btnAnalyze.disabled = true;
}

// Speech Recognition
function startRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showError('このブラウザはWeb Speech APIに対応していません。Chrome をお使いください。');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  let finalTranscript = '';
  let interimTranscript = '';

  recognition.onstart = () => {
    isRecognizing = true;
    btnStart.disabled = true;
    btnStop.classList.add('show');
    statusBar.classList.add('show');
    statusDot.className = 'pulse';
    statusText.textContent = '文字起こし中... （音声を再生してください）';
    transcriptBox.classList.add('show');
  };

  recognition.onresult = (e) => {
    interimTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalTranscript += t;
      } else {
        interimTranscript += t;
      }
    }
    transcript = finalTranscript;
    transcriptText.textContent = finalTranscript + (interimTranscript ? '\n【認識中】' + interimTranscript : '');
    transcriptText.scrollTop = transcriptText.scrollHeight;
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') {
      showError('音声認識エラー: ' + e.error);
    }
  };

  recognition.onend = () => {
    if (isRecognizing) {
      // 自動再起動
      recognition.start();
    } else {
      onStopRecognition();
    }
  };

  recognition.start();

  // 音声を自動再生
  audioPlayer.play().catch(() => {
    statusText.textContent = '▶ 音声プレイヤーの再生ボタンを押してください';
  });
}

function stopRecognition() {
  isRecognizing = false;
  if (recognition) recognition.stop();
  audioPlayer.pause();
}

function onStopRecognition() {
  btnStart.disabled = false;
  btnStop.classList.remove('show');
  statusDot.className = 'pulse green';
  statusText.textContent = '文字起こし完了 (' + transcript.length + '文字)';
  if (transcript.trim().length > 10) {
    btnAnalyze.disabled = false;
  }
}

btnStart.addEventListener('click', startRecognition);
btnStop.addEventListener('click', stopRecognition);

// Analyze with Claude
btnAnalyze.addEventListener('click', async () => {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { showError('APIキーを入力してください'); return; }
  if (!transcript.trim()) { showError('文字起こしテキストがありません'); return; }

  btnAnalyze.disabled = true;
  loadingCard.classList.add('show');
  loadingText.textContent = 'Claude が分析中... しばらくお待ちください';
  resultGrid.innerHTML = '';
  hideError();

  try {
    const prompt = `以下はポッドキャストの文字起こしです。次の3つを日本語で出力してください。

【文字起こし】
${transcript}

---
以下のJSON形式で必ず返してください（他のテキスト不要）:
{
  "summary": "300〜500文字の要約・まとめ",
  "terms": [
    {"name": "用語名", "desc": "わかりやすい説明（2〜3文）"},
    ...最大8個
  ],
  "mermaid": "graph LR や graph TD などのMermaid記法で概念の関係図（15ノード以内、日本語ラベル可）"
}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API エラー ' + res.status);
    }

    const data = await res.json();
    const raw = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    loadingCard.classList.remove('show');
    renderResults(parsed);

  } catch (e) {
    loadingCard.classList.remove('show');
    showError('エラー: ' + e.message);
    btnAnalyze.disabled = false;
  }
});

async function renderResults(data) {
  resultGrid.innerHTML = '';

  // 要約
  if (data.summary) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <h3><span class="dot"></span> SUMMARY — 要約・まとめ</h3>
      <div class="summary-text">${data.summary}</div>
    `;
    resultGrid.appendChild(card);
  }

  // 概念チャート
  if (data.mermaid) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <h3 style="color:var(--accent3)"><span class="dot"></span> CONCEPT MAP — 概念図</h3>
      <div class="chart-container">
        <div class="mermaid" id="mermaidChart">${data.mermaid}</div>
      </div>
    `;
    resultGrid.appendChild(card);
    try {
      await mermaid.run({ nodes: [document.getElementById('mermaidChart')] });
    } catch(e) {
      document.getElementById('mermaidChart').textContent = '[チャート描画エラー] ' + data.mermaid;
    }
  }

  // 用語解説
  if (data.terms && data.terms.length > 0) {
    const card = document.createElement('div');
    card.className = 'result-card';
    const termHTML = data.terms.map(t => `
      <div class="term-item">
        <div class="term-name">${t.name}</div>
        <div class="term-desc">${t.desc}</div>
      </div>
    `).join('');
    card.innerHTML = `
      <h3 style="color:var(--accent2)"><span class="dot"></span> GLOSSARY — 専門用語解説</h3>
      <div class="term-list">${termHTML}</div>
    `;
    resultGrid.appendChild(card);
  }
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}
function hideError() {
  errorMsg.classList.remove('show');
}
</script>
</body>
</html>
